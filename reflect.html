<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reflect | SoftSpace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f7f5f2, #eef2f7);
      color: #3f3f46;
      margin: 0;
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    nav a {
      text-decoration: none;
      color: #52525b;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    /* BREATHING */
    .breathing {
      width: 60px;
      height: 60px;
      margin: 1rem auto 0.5rem;
      border-radius: 50%;
      background: #e6e6fa;
      opacity: 0.7;
      animation: breathe 6s ease-in-out infinite;
    }

    .breathing-text {
      font-size: 0.85rem;
      color: #71717a;
    }

    @keyframes breathe {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    .card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 0.75rem;
      font-family: inherit;
      resize: none;
    }

    button {
      margin-top: 0.75rem;
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      border: none;
      background: #e6e6fa;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    .danger {
      background: #fcd5d5;
    }

    .entry {
      margin-top: 1rem;
      padding: 1rem;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      position: relative;
    }

    .entry-time {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-bottom: 0.4rem;
    }

    .entry-text {
      font-size: 0.95rem;
    }

    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.7rem;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
    }

    .delete-btn:hover {
      color: #000;
    }

    /* NEW: Prompt text styling */
    #promptText {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 0.5rem;
    }
  </style>
</head>

<body>
  <main class="container">

    <nav>
      <a href="index.html">← Back</a>
      <span>Reflect</span>
    </nav>

    <section class="hero">
      <h1>💬 Take a moment</h1>
      <p>You don’t have to figure everything out. Just write.</p>

      <div class="breathing"></div>
      <div class="breathing-text" id="breathingText">breathe in...</div>
    </section>

    <!-- INPUT -->
    <div class="card">
      <h3>Journal</h3>

      <!-- NEW: Prompt Button -->
      <button onclick="generatePrompt()">Give me a prompt</button>
      <p id="promptText"></p>

      <textarea id="journalInput" placeholder="What do I need right now?"></textarea>
      <br/>
      <button onclick="saveEntry()">Save</button>
      <button class="danger" onclick="clearEntries()">Clear All</button>
    </div>

    <!-- ENTRIES -->
    <div class="card">
      <h3>Your reflections</h3>
      <div id="entries"></div>
    </div>

  </main>

  <script>
    function saveEntry() {
      const input = document.getElementById("journalInput");
      const text = input.value.trim();

      if (!text) return;

      const newEntry = {
        text: text,
        time: new Date().toLocaleString()
      };

      let entries = JSON.parse(localStorage.getItem("softspaceEntries")) || [];
      entries.unshift(newEntry);
      localStorage.setItem("softspaceEntries", JSON.stringify(entries));

      input.value = "";
      displayEntries();
    }

    function deleteEntry(index) {
      let entries = JSON.parse(localStorage.getItem("softspaceEntries")) || [];
      entries.splice(index, 1);
      localStorage.setItem("softspaceEntries", JSON.stringify(entries));
      displayEntries();
    }

    function clearEntries() {
      localStorage.removeItem("softspaceEntries");
      displayEntries();
    }

    function displayEntries() {
      const container = document.getElementById("entries");
      const entries = JSON.parse(localStorage.getItem("softspaceEntries")) || [];

      container.innerHTML = "";

      entries.forEach((entry, index) => {
        if (!entry.text) return;

        const div = document.createElement("div");
        div.className = "entry";

        div.innerHTML = `
          <button class="delete-btn" onclick="deleteEntry(${index})">✕</button>
          <div class="entry-time">${entry.time}</div>
          <div class="entry-text">${entry.text}</div>
        `;

        container.appendChild(div);
      });
    }

    /* NEW: Prompt Generator */
    function generatePrompt() {
      const prompts = [
        "What do I need right now?",
        "What has been on my mind lately?",
        "What would I tell a friend feeling like this?",
        "What is one small thing I can do for myself today?",
        "What am I holding onto that I can let go of?"
      ];

      const random = prompts[Math.floor(Math.random() * prompts.length)];
      document.getElementById("promptText").innerText = random;
    }

    /* BREATHING TEXT SYNC */
    const textEl = document.getElementById("breathingText");

    function breathingLoop() {
      textEl.textContent = "breathe in...";
      setTimeout(() => {
        textEl.textContent = "hold...";
      }, 2000);

      setTimeout(() => {
        textEl.textContent = "breathe out...";
      }, 3000);
    }

    setInterval(breathingLoop, 6000);
    breathingLoop();

    displayEntries();
  </script>

</body>
</html>
